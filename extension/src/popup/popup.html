<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <h1>Desouper</h1>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </header>

    <div class="section">
      <label class="label">Filter Mode</label>
      <div class="btn-group" id="filter-mode">
        <button data-value="badge">Badge</button>
        <button data-value="dim" class="active">Dim</button>
        <button data-value="hide">Hide</button>
      </div>
    </div>

    <div class="section">
      <label class="label">Sensitivity</label>
      <div class="btn-group" id="sensitivity">
        <button data-value="low">Low</button>
        <button data-value="medium" class="active">Medium</button>
        <button data-value="high">High</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <label class="label">Whitelist</label>
      <div class="list-wrap">
        <div id="whitelist-items" class="list-items"></div>
        <div class="list-add">
          <input type="text" id="whitelist-input" placeholder="Seller name">
          <button id="whitelist-add">Add</button>
        </div>
      </div>
    </div>

    <div class="section">
      <label class="label">Blocklist</label>
      <div class="list-wrap">
        <div id="blocklist-items" class="list-items"></div>
        <div class="list-add">
          <input type="text" id="blocklist-input" placeholder="Seller name">
          <button id="blocklist-add">Add</button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="footer">
      <span class="version">v0.1.0</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
